version: "3.9"

services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: venzpro-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       venzpro
      POSTGRES_USER:     venzpro
      POSTGRES_PASSWORD: venzpro123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venzpro -d venzpro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./venzpro-backend
      dockerfile: Dockerfile
    container_name: venzpro-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/venzpro
      SPRING_DATASOURCE_USERNAME: venzpro
      SPRING_DATASOURCE_PASSWORD: venzpro123
      SPRING_JPA_HIBERNATE_DDL_AUTO:    validate
      SPRING_JPA_SHOW_SQL:              false
      JWT_SECRET:     venzpro-beta-secret-key-troque-em-producao-256bits-minimo
      JWT_EXPIRATION: 86400000
      LOGGING_LEVEL_COM_VENZPRO:                 INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: WARN
    depends_on:
      postgres:
        condition: service_healthy
    # Porta 8080 NÃO é exposta ao host — só acessível internamente pelo nginx
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend React (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./venzpro-frontend
      dockerfile: Dockerfile
      args:
        # Com proxy nginx, a API fica no mesmo host — sem CORS
        VITE_API_URL: /api
    container_name: venzpro-frontend
    restart: unless-stopped
    ports:
      - "8080:80"   # Acesse em http://localhost:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: