spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/venzpro}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  task:
    execution:
      pool:
        core-size: 2
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: venzpro-async-

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET:venzpro-dev-secret-key-nao-usar-em-producao-256bits-minimo}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.venzpro: ${LOGGING_LEVEL_COM_VENZPRO:INFO}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
    org.hibernate.SQL: WARN
    org.flywaydb: INFO