spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/venzpro}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      # CRÍTICO: separador customizado para suportar funções PL/pgSQL
      # O padrão (;) quebra dentro de blocos $$ ... $$
      separator: "@@"

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

jwt:
  secret: ${JWT_SECRET:venzpro-dev-secret-key-nao-usar-em-producao-256bits-minimo}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.venzpro: ${LOGGING_LEVEL_COM_VENZPRO:INFO}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
    org.hibernate.SQL: WARN